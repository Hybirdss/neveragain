<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>namazue.dev — Earthquake Operations Console</title>
    <meta name="description" content="Tokyo-first earthquake operations console with a dedicated lab route and legacy globe route." />

    <!-- Open Graph -->
    <meta property="og:title" content="namazue.dev — Earthquake Operations Console" />
    <meta property="og:description" content="Tokyo-first earthquake operations console with service, lab, and legacy routes." />
    <meta property="og:image" content="https://namazue.dev/namazue-hero.jpg" />
    <meta property="og:url" content="https://namazue.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Namazue" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="namazue.dev — Earthquake Operations Console" />
    <meta name="twitter:description" content="Tokyo-first earthquake operations console with service, lab, and legacy routes." />
    <meta name="twitter:image" content="https://namazue.dev/namazue-hero.jpg" />

    <!-- Theme -->
    <meta name="theme-color" content="#0c1017" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preload critical fonts for loading screen -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Loading screen — rendered before any JS loads */
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0c1017;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      #loading-screen.exit {
        opacity: 0;
        transform: translateY(-24px);
        pointer-events: none;
      }
      .loading-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        opacity: 0.9;
      }
      .loading-title {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #e2e8f0;
        letter-spacing: -0.02em;
        margin-top: 4px;
      }
      .loading-status {
        font-family: 'JetBrains Mono', 'SF Mono', monospace;
        font-size: 11px;
        color: #64748b;
        letter-spacing: 0.02em;
        min-height: 16px;
        transition: opacity 0.2s ease;
      }
      .loading-bar-track {
        width: 120px;
        height: 2px;
        background: #1a1f2e;
        border-radius: 1px;
        overflow: hidden;
        margin-top: 4px;
      }
      .loading-bar-fill {
        height: 100%;
        width: 0%;
        background: #60a5fa;
        border-radius: 1px;
        transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <img class="loading-icon" src="/favicon.png" alt="" width="56" height="56" />
      <div class="loading-title">鯰 Namazue</div>
      <div class="loading-status" id="loading-status">Initializing…</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar"></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/entry.ts"></script>
  </body>
</html>
