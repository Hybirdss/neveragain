name = "namazue-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# Workers dev subdomain (always on for testing)
workers_dev = true

# Smart Placement: closer to Neon DB (ap-southeast-1)
[placement]
mode = "smart"

[vars]
ALLOWED_ORIGINS = "https://namazue.dev,https://www.namazue.dev"
AIS_SNAPSHOT_TTL_MS = 60000
AISSTREAM_COLLECTION_WINDOW_MS = 1500

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "9cd827bb4fcc4a3ea2ed9f2e1eed9c78"

# R2 bucket for CDN-served data feeds (events, maritime, rail)
# Reads go through R2 public URL → CF CDN → zero Worker invocations
[[r2_buckets]]
binding = "FEED_BUCKET"
bucket_name = "namazue-tiles"

[[durable_objects.bindings]]
name = "MARITIME_HUB"
class_name = "MaritimeHub"

[[durable_objects.bindings]]
name = "SEISMIC_SENTINEL"
class_name = "SeismicSentinel"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MaritimeHub"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SeismicSentinel"]

# Cron triggers — every 5 minutes for JMA/USGS polling + analysis generation
# Free tier: 100K requests/day — every-minute cron alone burns 1,440/day
[triggers]
crons = [
  "* * * * *",
]
